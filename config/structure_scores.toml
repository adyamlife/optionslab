# ══════════════════════════════════════════════════════════════════════════════
# Phase 1 signal additions — atr, hv30, iv_percentile, earnings_dte, div_dte
#
# Weight philosophy:
#   iv_percentile  10-15  on credit structures — confirms IV is historically rich,
#                          not just rich vs HV today.  Lower on debit structures
#                          (want historically cheap options).
#   atr             8-12  on credit structures (want low ATR for premium collection);
#                          flipped for directional/vol-expansion (want elevated ATR).
#   hv30            6-10  confirming signal alongside iv_premium; lower weight because
#                          it is correlated — double-counting is limited by normalisation.
#   earnings_dte   10-15  on all premium-collection structures; confirms event-window
#                          safety.  Flipped to "near" on long-vol structures (they want
#                          the catalyst).
#   div_dte         5-12  only where short call legs create early-assignment risk:
#                          Covered Call (highest), IC/Strangle/Straddle (medium),
#                          CSP / put-only structures (very low or omitted).
# ══════════════════════════════════════════════════════════════════════════════

