# config/structure_scores.toml
# Per-structure signal weights and preferences for the generic scoring engine.
#
# Schema version — the loader rejects unsupported versions at startup.
version = 1

[meta]
# Weights need NOT sum to 100.  The scoring engine normalises automatically:
#   pct = Σ(weight × regime_mult × signal_score) / Σ(weight × regime_mult)
# A startup warning is emitted when a structure's weights don't sum to 100,
# but this is advisory only — the math is identical either way.
# Example: EMA=3, ADX=2, IV=5 produces the same scores as EMA=25, ADX=17, IV=42.
weight_sum_expected = 100
# Evaluators return signed scores in [-1.0, +1.0].
score_range = "signed"

# ── Preference reference ───────────────────────────────────────────────────────
# Meta-preferences resolved at score time:
#   "directional"  → "bullish" or "bearish" from daily trend
#
# weekly_trend preferences:
#   "aligned"       — weekly must match daily (directional trades)
#   "bullish"       — weekly should be Uptrend
#   "bearish"       — weekly should be Downtrend
#   "neutral"       — weekly should be Range-bound
#   "divergence_ok" — divergence is not penalised (calendar/vol structures)
#
# adx preferences:
#   "strong"    — ADX > 25 (trending)
#   "weak"      — ADX < 20 (range-bound)
#   "moderate"  — ADX 18–28 (mild trend, low breakout risk for theta strategies)
#   "expanding" — ADX rising from low base (coiling setup for vol plays)

