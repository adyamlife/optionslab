# Earnings dates are looked up live via yfinance (see
# scripts/data_fetch.get_next_earnings_date) - no manual config needed.

[capital]
amount = 1000
max_risk_pct = 0.12          # max loss per trade as % of capital
max_concurrent_positions = 2

[dte]
min_dte = 2
max_dte = 30
event_blackout_days = 5  # skip ticker if earnings fall within this many days of expiry

# Preferred DTE targets for expiry selection. pick_expiry() chooses the available
# expiry whose DTE is closest to one of these targets (nearest target wins).
# Trades at these tenors have well-understood theta/gamma profiles for the strategies used.
candidate_dte = [14, 21, 30, 45, 60, 90]

# ── Per-trade quality gates ───────────────────────────────────────────────────
# Applied in filter_candidates() before composite scoring.
# Thresholds marked (future) require POP model data — loaded but not enforced yet.
[min_trade]
min_expected_roi     = 0.10   # (credit / capital_required) × pop_estimate ≥ this; 0 = disabled
max_theta_per_day    = 0.05   # |net_theta| per share per day above this → skip (high theta decay risk)
min_liquidity_score  = 0.60   # composite of OI, bid-ask tightness, rel_volume; 0 = disabled
max_drawdown_proxy   = 0.95   # max_loss / capital_required above this → skip (nearly total-loss trades)

# The thresholds below are strategy-level metrics — meaningful only over 50+ closed trades.
# They are stored here for future use by the performance analytics module,
# NOT as per-trade entry filters (a single trade has no win rate or Sharpe).
# Revisit once POP model has ≥ 100 labeled rows (estimated August 2026).
# min_win_rate      = 0.60   # post-hoc: wins / total closed trades
# min_sharpe        = 0.40   # post-hoc: mean_return / std_return across closed trades
# min_profit_factor = 1.50   # post-hoc: sum(wins) / sum(losses)

[iv]
iv_rank_high_threshold = 50  # IV rank >= this -> "High" IV environment

[trend]
sma_short = 20               # SMA periods for trend classification
sma_long = 50
band_pct = 0.005             # price within this % of SMA counts as "range-bound" tiebreak

# Entry criteria - deltas are approximate magnitudes (sign handled by leg type)
[credit_spread]
short_delta_lo = 0.15
short_delta_hi = 0.25
min_credit_pct_of_width = 0.25   # credit must be >= 25% of spread width

[debit_spread]
long_delta_lo = 0.45
long_delta_hi = 0.65
short_delta_lo = 0.15
short_delta_hi = 0.20

[liquidity]
min_open_interest = 200       # min OI required on each leg's strike
min_profit_amount = 1.00     # min max-profit per share ($1.00/sh = $100/contract minimum)

# Calendar / diagonal spread: gap (in days) between the front-month expiry
# already chosen by min_dte/max_dte and the back-month (long) leg's expiry
[calendar]
min_gap_days = 14
max_gap_days = 60

# Jade Lizard: naked short put delta range (wider/further OTM than the
# defined-risk credit spread short leg, since this leg carries downside risk)
[jade_lizard]
put_delta_lo = 0.20
put_delta_hi = 0.30

# Risk Reversal: sell OTM put + buy OTM call.
# put and call delta ranges are symmetric — put skew in Low IV usually makes
# the put leg richer, producing a net credit. Requires margin for the short put.
[risk_reversal]
put_delta_lo  = 0.15
put_delta_hi  = 0.25
call_delta_lo = 0.15
call_delta_hi = 0.25

# Bear Combo: bear put debit spread + bear call credit spread (4 legs, fully defined risk).
# put_long is the closer-to-ATM put bought for bearish directional exposure.
# put_short / call_short share the OTM credit spread delta band.
# call_long is the far-OTM put bought to cap the short call's upside risk.
[bear_combo]
put_long_delta_lo  = 0.35   # long put (ATM-ish, directional)
put_long_delta_hi  = 0.50
put_short_delta_lo = 0.15   # short put (OTM, defines max profit floor)
put_short_delta_hi = 0.25
call_short_delta_lo = 0.15  # short call (OTM, collects premium)
call_short_delta_hi = 0.25
call_long_delta_lo  = 0.05  # long call (far OTM, caps upside risk — defines max loss)
call_long_delta_hi  = 0.15

# Financed Long Call: put credit spread + standalone long call (moderate bullish + IV contracting).
# The put spread credit partially or fully pays for the OTM call.
# put_short = OTM put sold (credit), put_long = further OTM put bought (cap), call = OTM call bought.
[financed_long_call]
put_short_delta_lo = 0.20   # short put (OTM, credit leg — same band as credit spreads)
put_short_delta_hi = 0.30
call_long_delta_lo = 0.25   # long call (OTM, directional exposure)
call_long_delta_hi = 0.40

# Financed Long Put: call credit spread + standalone long put (moderate bearish + IV contracting).
# Mirror of Financed Long Call.
[financed_long_put]
call_short_delta_lo = 0.20  # short call (OTM, credit leg)
call_short_delta_hi = 0.30
put_long_delta_lo  = 0.25   # long put (OTM, directional exposure)
put_long_delta_hi  = 0.40

# Ratio Backspread: sell 1 near-ATM option, buy 2 OTM options.
# Call Backspread: bullish + IV expanding. Put Backspread: bearish + IV expanding.
# Usually entered for a small credit or near-zero cost — max loss is the dead zone at expiry.
[ratio_backspread]
short_delta_lo = 0.40   # short leg (near-ATM, 1×)
short_delta_hi = 0.55
long_delta_lo  = 0.20   # long legs (OTM, 2×)
long_delta_hi  = 0.35

# Long Strangle: buy OTM call + buy OTM put. Pure long-vol / large-move play.
# Recommended only when debit fits capital limit; shown informational otherwise.
[long_strangle]
call_delta_lo = 0.15
call_delta_hi = 0.25
put_delta_lo  = 0.15
put_delta_hi  = 0.25

# Paper trade managed-exit rules
[management]
profit_target_pct = 0.90  # close when spread mark reaches this % of entry credit (90% of max profit)
stop_loss_mult    = 3.0   # close when spread mark reaches this multiple of entry credit (300% loss)
early_close_pct   = 100   # also close immediately if unrealized P&L hits 100% of max profit before expiry
market_close_hour = 16    # ET hour at which the market is considered closed (4pm)

# ML confidence gate + Kelly sizing (paper trades + live suggestions)
# These thresholds only apply when pred_dist is available (ML models trained).
# When ML data is absent the gate is bypassed and classic EV ranking is used.
[ml_gate]
enabled          = true   # set false to disable the gate entirely (fall back to pure EV ranking)
min_p_win        = 0.55   # minimum composite win probability (p_win from pred_dist, direction-adjusted)
min_confidence   = 0.60   # minimum model-agreement confidence (0–1)
kelly_fraction   = 0.5    # Half-Kelly by default (1.0 = full Kelly, unsafe for live)
kelly_max_pct    = 0.05   # hard cap: Kelly fraction never exceeds this % of capital
kelly_min_pct    = 0.01   # floor: always risk at least this % when gate passes

# Risk limits (informational - these are checked and surfaced in the UI;
# the system will warn when these thresholds are approached)
[risk_limits]
max_open_positions       = 5     # max simultaneous open trades across the portfolio
max_daily_loss_pct       = 0.03  # 3% of capital - stop taking new trades if hit
max_weekly_loss_pct      = 0.06  # 6% of capital
max_position_pct         = 0.05  # single position max as % of capital (5%)
max_sector_pct           = 0.20  # single sector max as % of capital (20%)
max_net_delta            = 0.15  # portfolio-level net delta limit
max_position_capital_pct = 0.05  # single position max capital allocation
max_portfolio_vega       = 0.50  # portfolio net vega cap (short-vega negative; exceeding triggers warning)
breakeven_cushion_iv_scale = 0.25  # proximity danger/caution thresholds scale with atm_iv * this factor

# Diagonal Spread: buy back-month option, sell front-month option at a different strike.
# Bullish diagonal: BUY back-month lower-strike call, SELL front-month higher-strike call.
# Bearish diagonal: BUY back-month higher-strike put, SELL front-month lower-strike put.
[diagonal]
long_delta_lo  = 0.40     # back-month long leg delta range
long_delta_hi  = 0.60
short_delta_lo = 0.20     # front-month short leg delta range (further OTM)
short_delta_hi = 0.35
min_gap_days   = 14       # min days between front and back expiry
max_gap_days   = 45

# AI assessment: per-ticker trade quality analysis.
# Primary provider is tried first; if it fails or has no API key,
# the fallback is used. Set either key to "" to disable that provider.
# API keys go in config/secrets.toml (never commit that file).
# Market constants
[market]
risk_free_rate = 0.043  # annualised risk-free rate (update periodically with 3-month T-bill)

# Strike/width search grids for the best-EV optimizer (analyze.py).
# Wider WIDTH_GRID entries suit high-priced underlyings (SPY, NVDA);
# narrower entries suit low-priced tickers. Deltas are absolute magnitudes.
[optimize_grid]
credit_delta_grid      = [0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40]
width_grid             = [1, 1.5, 2, 3, 5, 7, 10, 15, 20, 30]
debit_long_delta_grid  = [0.35, 0.40, 0.45, 0.50, 0.55, 0.60, 0.65]
debit_short_delta_grid = [0.10, 0.15, 0.20, 0.25, 0.30]

# IV edge / vol-surface mispricing thresholds (vega points).
# skip_vp: skip entering if surface edge is this many vp against us.
# flag_vp: flag an open position if short strike drifts this many vp expensive/cheap.
# bonus_scale: maps iv_edge_vp → signal-score adjustment (points per vp, capped).
[iv_edge]
skip_vp    = 2.5
flag_vp    = 2.0
bonus_scale = 0.15

# Paper trade entry filters.
# margin_account: set true when your brokerage account has margin approval.
#   false (default) → structures with requires_margin=True (Naked Put, Jade Lizard)
#   are skipped entirely in run_morning_scan — no phantom trades for strategies
#   you cannot actually execute.
# exclude_structures: additional structure names to always skip in paper trades,
#   regardless of margin setting (e.g. strategies you are not yet comfortable with).
[paper_trades]
margin_account     = false
exclude_structures  = ["Covered Call"]  # requires owning 100 shares — not paper-tradeable without shares
min_profit_amount   = 0.50    # paper-trade override: lower gate vs live ($0.50/sh)
min_confidence      = 0.50    # paper-trade override: all outcomes are training data, 0.70 is too strict
min_open_interest   = 50      # paper-trade override: allow thinner strikes (live uses 200)
max_theta_per_day   = 0.0     # paper-trade override: disable theta gate entirely (collect all structures)
min_expected_roi    = 0.075   # paper-trade override: 7.5% vs 10% live (but ROI gate now uses per-share units)
min_liquidity_score = 0.30    # paper-trade override: collect diverse structures (live uses 0.60)

[ai]
primary_provider  = "groq"
primary_model     = "llama-3.3-70b-versatile"
fallback_provider = "gemini"
fallback_model    = "gemini-2.0-flash-lite"
