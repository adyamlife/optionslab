# ── Slot routing: (iv_env, trend) → ordered candidate list ───────────────────
# select_structure() uses this list. Order determines the tiebreak when two
# candidates have identical trade_quality_pct after DTE adjustment.
# First entry also becomes the STRUCTURE_MATRIX winner (preliminary structure
# before signal scoring, used as a fallback early in analyze_ticker).

[[slot]]
iv_env     = "High"
trend      = "Uptrend"
candidates = [
  "Put Credit Spread",
  "Jade Lizard",
  "Cash Secured Put",
  "Covered Call",
]

