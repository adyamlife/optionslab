# config/structures.toml
# Structure registry — single source of truth for routing and per-structure config.
#
# Two sections:
#   [[structure]]  per-strategy metadata (iv_envs, trends, dte window, preferred_delta)
#   [[slot]]       (iv_env, trend) → ordered candidate list for select_structure()
#
# Adding a new strategy to an existing slot: add its name to the slot's candidates list.
# Changing priority: reorder the candidates list.
# Adding a new slot (e.g. "High"/"Sideways"): add a [[slot]] entry.
# No Python changes needed for any of the above.
#
# Note: is_credit, dte_min/max, and preferred_delta here are the authoritative
# values. The Python OptionStructure objects in config/structures/*.py own the
# complex metadata (HedgeDef, StrikeSchema, expiry_pnl_fn) that cannot be expressed
# in TOML.

# ── Per-structure configuration ───────────────────────────────────────────────

[[structure]]
name             = "Put Credit Spread"
is_credit        = true
iv_envs          = ["High"]
trends           = ["Uptrend"]
min_dte          = 21
max_dte          = 60
preferred_delta  = 0.20   # target short-leg delta at entry

