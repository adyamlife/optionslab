<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Options Strategy Lab</title>
  <link rel="stylesheet" href="/static/css/style.css?v={{ asset_v }}">
  <link rel="stylesheet" href="/static/css/login.css?v={{ asset_v }}">
</head>
<body>
  <div class="login-card">

    <div class="login-logo">
      <h1>Options Strategy Lab</h1>
      <p>Sign in to continue</p>
    </div>

    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}" autocomplete="off">
      <label for="username">Username</label>
      <input type="text" id="username" name="username"
             placeholder="username"
             autocomplete="username"
             autofocus
             required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             placeholder="••••••••••"
             autocomplete="current-password"
             required>

      <button type="submit" class="login-submit">Sign In</button>
    </form>

    <div class="login-footer">
      Options Strategy Lab &mdash; internal use only
    </div>

  </div>
</body>
</html>
