<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Options Strategy Lab</title>
  <link rel="stylesheet" href="/static/css/style.css?v={{ asset_v }}">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: var(--bg, #111);
    }

    .login-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 12px;
      padding: 2.4rem 2.8rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.45);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .login-logo h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #e0e0e0;
      margin: 0 0 0.25rem;
      letter-spacing: 0.02em;
    }

    .login-logo p {
      font-size: 0.8rem;
      color: #555;
      margin: 0;
    }

    .login-card label {
      display: block;
      font-size: 0.78rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.35rem;
    }

    .login-card input[type="text"],
    .login-card input[type="password"] {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 1.1rem;
      font-size: 0.95rem;
      padding: 0.55rem 0.75rem;
    }

    .login-card input[type="password"] {
      letter-spacing: 0.1em;
    }

    .login-submit {
      width: 100%;
      padding: 0.65rem;
      font-size: 0.95rem;
      font-weight: 600;
      background: #3a7bd5;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.25rem;
    }
    .login-submit:hover { background: #2e63b8; }
    .login-submit:active { background: #2455a0; }

    .login-error {
      background: rgba(229,57,53,0.12);
      border: 1px solid rgba(229,57,53,0.3);
      color: #ef5350;
      border-radius: 6px;
      padding: 0.55rem 0.8rem;
      font-size: 0.82rem;
      margin-bottom: 1.1rem;
      text-align: center;
    }

    .login-footer {
      text-align: center;
      font-size: 0.72rem;
      color: #444;
      margin-top: 1.6rem;
    }
  </style>
</head>
<body>
  <div class="login-card">

    <div class="login-logo">
      <h1>Options Strategy Lab</h1>
      <p>Sign in to continue</p>
    </div>

    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}" autocomplete="off">
      <label for="username">Username</label>
      <input type="text" id="username" name="username"
             placeholder="username"
             autocomplete="username"
             autofocus
             required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             placeholder="••••••••••"
             autocomplete="current-password"
             required>

      <button type="submit" class="login-submit">Sign In</button>
    </form>

    <div class="login-footer">
      Options Strategy Lab &mdash; internal use only
    </div>

  </div>
</body>
</html>
